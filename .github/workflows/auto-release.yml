name: Auto-release new build
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Determine next tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPSTREAM_VER=$(curl -s https://raw.githubusercontent.com/PathOfBuildingCommunity/PathOfBuilding-PoE2/master/manifest.xml \
            | grep -oE 'number="[^"]+"' | head -1 | cut -d'"' -f2)

          LAST_ITER=$(gh release list --repo "${{ github.repository }}" --limit 100 \
            --json tagName --jq '.[].tagName' \
            | grep -E "^v${UPSTREAM_VER}-macos\.[0-9]+\$" \
            | sed -E "s/.*\.([0-9]+)\$/\1/" \
            | sort -n | tail -1)
          ITER=$(( ${LAST_ITER:-0} + 1 ))

          TAG="v${UPSTREAM_VER}-macos.${ITER}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "upstream_ver=$UPSTREAM_VER" >> "$GITHUB_OUTPUT"
          echo "Will create: $TAG"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.MACOS_DISPATCH_PAT }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --target main \
            --title "Path of Building 2 v${{ steps.tag.outputs.upstream_ver }} — macOS Apple Silicon" \
            --notes "Auto-generated build matching PathOfBuilding-PoE2 v${{ steps.tag.outputs.upstream_ver }}."
